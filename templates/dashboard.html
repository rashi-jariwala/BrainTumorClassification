<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-brain"></i>

        <h3>NeuroVision AI</h3>

    </div>

    <ul>

        <li class="active">

            <a href="/dashboard">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

        </li>

        <li>

            <a href="/prediction">

                <i class="fa-solid fa-microscope"></i>

                Predict Tumor

            </a>

        </li>

        <!-- <li>

            <a href="/profile">

                <i class="fa-solid fa-user"></i>

                Profile

            </a>

        </li> -->

        <li>

            <a href="#" onclick="logout()">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <div>

            <h2>Dashboard</h2>

            <p>Brain Tumor Detection System</p>

        </div>

        <div class="profile">

            <i class="fa-solid fa-circle-user"></i>

            <span id="username">Welcome</span>

        </div>

    </div>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card dashboard-card">

                <i class="fa-solid fa-brain"></i>

                <h5>Total Predictions</h5>

                <h2 id="totalPrediction">0</h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card">

                <i class="fa-solid fa-robot"></i>

                <h5>Model</h5>

                <h2>CNN</h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card">

                <i class="fa-solid fa-heart-pulse"></i>

                <h5>Status</h5>

                <h2 class="text-success">

                    Active

                </h2>

            </div>

        </div>

    </div>

    <div class="prediction-card">

        <img src="{{ url_for('static', filename='images/brain-banner.jpg') }}" class="banner">

        <div>

            <h2>

                AI Powered Brain MRI Detection

            </h2>

            <p>

                Upload MRI images and detect brain tumors using CNN.

            </p>

            <button class="btn btn-primary btn-lg" onclick="openPrediction()">

                <i class="fa-solid fa-upload"></i>

                Predict Brain Tumor

            </button>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>

</html>
