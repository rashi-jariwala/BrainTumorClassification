<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brain Tumor Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/prediction.css') }}">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-brain"></i>

        <h3>NeuroVision AI</h3>

    </div>

    <ul>

        <li>

            <a href="/dashboard">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

        </li>

        <li class="active">

            <a href="/prediction">

                <i class="fa-solid fa-microscope"></i>

                Prediction

            </a>

        </li>

        <!-- <li>

            <a href="/profile">

                <i class="fa-solid fa-user"></i>

                Profile

            </a>

        </li> -->

        <li>

            <a href="#" onclick="logout()">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <h2>Brain Tumor Prediction</h2>

    </div>

    <div class="prediction-container">

        <div class="upload-card">

            <h3>Upload MRI Image</h3>

            <br>

            <label class="upload-box">

                <input
                    type="file"
                    id="imageInput"
                    accept=".jpg,.jpeg,.png"
                    onchange="previewImage(event)"
                    hidden>

                <img
                    id="previewImage"
                    src="{{ url_for('static', filename='images/upload.jpg') }}">

                <p>

                    Click Here To Upload MRI Image

                </p>

            </label>

            <button
                id="predictBtn"
                class="btn btn-primary btn-lg mt-4"
                onclick="predictImage()">

                <i class="fa-solid fa-brain"></i>

                Predict Brain Tumor

            </button>

        </div>

        <div class="result-card">

            <h3>

                Prediction Result

            </h3>

            <hr>

            <h4>

                Prediction

            </h4>

            <h2 id="prediction">

                --

            </h2>

            <br>

            <h4>

                Confidence

            </h4>

            <h2 id="confidence">

                --

            </h2>

            <br>

            <div id="loader" style="display:none;">

                <div class="spinner-border text-primary"></div>

                <br><br>

                <h5>

                    Predicting...

                </h5>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/prediction.js') }}"></script>

</body>

</html>
